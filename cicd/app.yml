---
# Source: blog/templates/db_configmap.yml
apiVersion: v1
kind: ConfigMap #хранит параметры контейнера
metadata:
  name: db-env-config #имя конфига
  namespace: test
data: #Данные хранящие в мапе
  POSTGRES_DB: blog
  POSTGRES_USER: main_user
  POSTGRES_PASSWORD: main_pass
  POSTGRES_NAMESPACE: test
  POSTGRES_PORT: "5432"
  POSTGRES_DRIVER: org.postgresql.Driver
  POSTGRES_URL: blog-db-svc
---
# Source: blog/templates/pgadmin_configmap.yml
apiVersion: v1
kind: ConfigMap #хранит параметры контейнера
metadata:
  name: pgadmin-config #имя конфига
  namespace: test
data: #Данные хранящие в мапе
  PGADMIN_DEFAULT_EMAIL: mail@org.com
  PGADMIN_DEFAULT_PASSWORD: pg-pass
---
# Source: blog/templates/app.yaml
apiVersion: v1
kind: Service
metadata:
  name: blog-app-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: blog-app
    app.kubernetes.io/instance: blog
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30022
---
# Source: blog/templates/app.yaml
apiVersion: v1
kind: Service
metadata:
  name: blog-db-svc
  namespace: default
spec:
  selector:
    app.kubernetes.io/name: blog-db
    app.kubernetes.io/instance: blog
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
# Source: blog/templates/app.yaml
apiVersion: v1
kind: Service
metadata:
  name: blog-pgadmin-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: blog-pgadmin
    app.kubernetes.io/instance: blog
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
      nodePort: 30002
---
# Source: blog/templates/k8s_service.yml
apiVersion: v1 #для сервиса v1 присваевает IP внутренее
kind: Service
metadata:
  name: decoder-backend-service
spec:
  selector: #для связи сервиса с подами
    app: decoder-backend #связь по лейблу
  ports:
    - protocol: TCP
      port: 80 #внешний порт сервиса
      targetPort: 8080 #порт внутри контейнера
---
# Source: blog/templates/k8s_service.yml
# используется для разделение документа

apiVersion: v1
kind: Service
metadata:
  name: decoder-frontend-service
spec:
  #с Ingress не нужен открывать сервис во вне, все делает он
  # type: LoadBalancer #имеет внешний IP адрес в отличии от кластер IP
  selector:
    app: decoder-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      #с Ingress не нужен открывать сервис во вне, все делает он
      #nodePort: 30000 #порт который будет открыт на физ машине он должен быть в диапазоне от 30000-32767
---
# Source: blog/templates/app.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app-deployment
  namespace: default
  labels:
    app.kubernetes.io/name: blog-app
    app.kubernetes.io/instance: blog
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-app
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-app
        app.kubernetes.io/instance: blog
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: app
          image: blog:1.0.1c
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 256M
              cpu: 100m
            limits:
              memory: 256M
              cpu: 200m
          command:
            - java
          args:
            - -jar
            - blog-0.0.1.jar
          envFrom:
            - configMapRef:
                name: db-env-config
---
# Source: blog/templates/app.yaml
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-db-deployment
  namespace: default
  labels:
    app.kubernetes.io/name: blog-db
    app.kubernetes.io/instance: blog
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-db
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-db
        app.kubernetes.io/instance: blog
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: db
          image: postgres_blog:1.0.0
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: 256M
              cpu: 100m
            limits:
              memory: 256M
              cpu: 200m
          envFrom:
            - configMapRef:
                name: db-env-config
---
# Source: blog/templates/app.yaml
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-liquibase-deployment
  namespace: default
  labels:
    app.kubernetes.io/name: blog-liquibase
    app.kubernetes.io/instance: blog
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-liquibase
      app.kubernetes.io/instance: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-liquibase
        app.kubernetes.io/instance: blog
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: liquibase
          image: liquibase:4.11
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 256M
              cpu: 100m
            limits:
              memory: 256M
              cpu: 200m
          command:
            - liquibase
            - --defaults-file=/liquibase/changelog/liquibase.properties
            - update
          envFrom:
            - configMapRef:
                name: db-env-config
---
